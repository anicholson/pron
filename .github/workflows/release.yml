name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          bin="target/${{ matrix.target }}/release/pron"
          if [ "${{ matrix.cross }}" != "true" ]; then
            if [ "${{ matrix.runner }}" = "macos-latest" ]; then
              strip "$bin"
            else
              strip --strip-all "$bin"
            fi
          fi
          tar czf pron-${{ matrix.target }}.tar.gz -C "$(dirname "$bin")" "$(basename "$bin")"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum pron-${{ matrix.target }}.tar.gz > pron-${{ matrix.target }}.sha256
          else
            shasum -a 256 pron-${{ matrix.target }}.tar.gz > pron-${{ matrix.target }}.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pron-${{ matrix.target }}
          path: |
            pron-${{ matrix.target }}.tar.gz
            pron-${{ matrix.target }}.sha256

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
